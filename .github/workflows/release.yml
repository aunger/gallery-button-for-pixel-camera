name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v0.0.2)'
        required: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version from tag
        id: version
        run: |
          REF="${{ github.event.inputs.tag_name || github.ref_name }}"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${REF}" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./gradlew testDebugUnitTest -PversionName=${{ steps.version.outputs.version }} --no-daemon

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./gradlew assembleRelease -PversionName=${{ steps.version.outputs.version }} --no-daemon

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/*.apk \
             app/build/outputs/apk/release/gb4pc-${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: GB4PC ${{ steps.version.outputs.tag_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/gb4pc-${{ steps.version.outputs.version }}.apk
